name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.0)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os:     macos-latest
            archive: tar.gz
            features: metal
          # Cross-compile Intel macOS from the arm64 runner — GitHub has
          # effectively retired the macos-13 (Intel) hosted runners.
          - target: x86_64-apple-darwin
            os:     macos-latest
            archive: tar.gz
            features: metal
          - target: x86_64-unknown-linux-gnu
            os:     ubuntu-latest
            archive: tar.gz
            features: ''
          - target: x86_64-pc-windows-msvc
            os:     windows-latest
            archive: zip
            features: ''

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build rag (with optional features)
        shell: bash
        run: |
          features="${{ matrix.features }}"
          if [ -n "$features" ]; then
            cargo build --release --target ${{ matrix.target }} --bin rag --features "rag-cli/$features"
          else
            cargo build --release --target ${{ matrix.target }} --bin rag
          fi

      - name: Build md
        shell: bash
        # md has no GPU features — pure CPU on every platform.
        run: cargo build --release --target ${{ matrix.target }} --bin md

      - name: Build crawl
        shell: bash
        # crawl is pure CPU too — no feature flags.
        run: cargo build --release --target ${{ matrix.target }} --bin crawl

      - name: Stage artifacts (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p stage-rag stage-md stage-crawl dist
          cp "target/${{ matrix.target }}/release/rag" stage-rag/rag
          cp README.md LICENSE stage-rag/
          tar -czf "dist/rag-${{ matrix.target }}.tar.gz" -C stage-rag rag README.md LICENSE

          cp "target/${{ matrix.target }}/release/md" stage-md/md
          cp README.md LICENSE stage-md/
          tar -czf "dist/md-${{ matrix.target }}.tar.gz" -C stage-md md README.md LICENSE

          cp "target/${{ matrix.target }}/release/crawl" stage-crawl/crawl
          cp README.md LICENSE stage-crawl/
          tar -czf "dist/crawl-${{ matrix.target }}.tar.gz" -C stage-crawl crawl README.md LICENSE

          # Combined bundle: all three tools + docs, so one download does the
          # whole crawl -> md -> rag workflow.
          mkdir -p stage-bundle
          cp "target/${{ matrix.target }}/release/rag"   stage-bundle/rag
          cp "target/${{ matrix.target }}/release/md"    stage-bundle/md
          cp "target/${{ matrix.target }}/release/crawl" stage-bundle/crawl
          cp README.md LICENSE stage-bundle/
          cp .github/bundle/GETTING-STARTED.txt stage-bundle/GETTING-STARTED.txt
          tar -czf "dist/tools-${{ matrix.target }}.tar.gz" -C stage-bundle \
            rag md crawl README.md LICENSE GETTING-STARTED.txt

      - name: Stage artifacts (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force -Path "stage-rag","stage-md","stage-crawl","dist" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/rag.exe" "stage-rag/rag.exe"
          Copy-Item "README.md" "stage-rag/README.md"
          Copy-Item "LICENSE"   "stage-rag/LICENSE"
          Compress-Archive -Path "stage-rag/rag.exe","stage-rag/README.md","stage-rag/LICENSE" `
                           -DestinationPath "dist/rag-${{ matrix.target }}.zip" -Force

          Copy-Item "target/${{ matrix.target }}/release/md.exe" "stage-md/md.exe"
          Copy-Item "README.md" "stage-md/README.md"
          Copy-Item "LICENSE"   "stage-md/LICENSE"
          Compress-Archive -Path "stage-md/md.exe","stage-md/README.md","stage-md/LICENSE" `
                           -DestinationPath "dist/md-${{ matrix.target }}.zip" -Force

          Copy-Item "target/${{ matrix.target }}/release/crawl.exe" "stage-crawl/crawl.exe"
          Copy-Item "README.md" "stage-crawl/README.md"
          Copy-Item "LICENSE"   "stage-crawl/LICENSE"
          Compress-Archive -Path "stage-crawl/crawl.exe","stage-crawl/README.md","stage-crawl/LICENSE" `
                           -DestinationPath "dist/crawl-${{ matrix.target }}.zip" -Force

          # Combined bundle: all three tools + docs, so one download does the
          # whole crawl -> md -> rag workflow.
          New-Item -ItemType Directory -Force -Path "stage-bundle","stage-bundle/bin","stage-bundle/THIRD-PARTY-LICENSES","dl" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/rag.exe"   "stage-bundle/rag.exe"
          Copy-Item "target/${{ matrix.target }}/release/md.exe"    "stage-bundle/md.exe"
          Copy-Item "target/${{ matrix.target }}/release/crawl.exe" "stage-bundle/crawl.exe"
          Copy-Item "README.md" "stage-bundle/README.md"
          Copy-Item "LICENSE"   "stage-bundle/LICENSE"
          Copy-Item ".github/bundle/GETTING-STARTED.txt" "stage-bundle/GETTING-STARTED.txt"

          # Bundle the optional converters so .docx/.epub/.pdf work offline with
          # zero installs. md/rag find them via extract-core's next-to-exe
          # lookup (stage-bundle/bin). Pull the latest official Windows builds.
          Write-Host "Fetching pandoc (latest windows-x86_64) ..."
          gh release download --repo jgm/pandoc --pattern "*windows-x86_64.zip" --dir dl --clobber
          $pz = (Get-ChildItem dl -Filter "*windows-x86_64.zip" | Select-Object -First 1).FullName
          Expand-Archive -Path $pz -DestinationPath dl/pandoc -Force
          $pandoc = (Get-ChildItem -Recurse dl/pandoc -Filter pandoc.exe | Select-Object -First 1).FullName
          Copy-Item $pandoc "stage-bundle/bin/pandoc.exe"
          $pdlic = Get-ChildItem -Recurse dl/pandoc -Include "COPYRIGHT*","COPYING*" | Select-Object -First 1
          if ($pdlic) { Copy-Item $pdlic.FullName "stage-bundle/THIRD-PARTY-LICENSES/pandoc-COPYRIGHT.txt" }

          Write-Host "Fetching poppler (pdftotext + DLLs) ..."
          gh release download --repo oschwartz10612/poppler-windows --pattern "Release-*.zip" --dir dl --clobber
          $rz = (Get-ChildItem dl -Filter "Release-*.zip" | Select-Object -First 1).FullName
          Expand-Archive -Path $rz -DestinationPath dl/poppler -Force
          $popbin = Split-Path (Get-ChildItem -Recurse dl/poppler -Filter pdftotext.exe | Select-Object -First 1).FullName
          Copy-Item "$popbin/pdftotext.exe" "stage-bundle/bin/"
          Copy-Item "$popbin/*.dll" "stage-bundle/bin/" -ErrorAction SilentlyContinue
          $poplic = Get-ChildItem -Recurse dl/poppler -Include "COPYING*","LICENSE*" | Select-Object -First 1
          if ($poplic) { Copy-Item $poplic.FullName "stage-bundle/THIRD-PARTY-LICENSES/poppler-COPYING.txt" }

          if (-not (Test-Path "stage-bundle/bin/pandoc.exe"))    { throw "pandoc.exe missing from bundle" }
          if (-not (Test-Path "stage-bundle/bin/pdftotext.exe")) { throw "pdftotext.exe missing from bundle" }
          Write-Host "Bundle bin/ contents:"; Get-ChildItem stage-bundle/bin | Format-Table Name,Length
          Compress-Archive -Path "stage-bundle/*" -DestinationPath "dist/tools-${{ matrix.target }}.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            dist/rag-${{ matrix.target }}.tar.gz
            dist/rag-${{ matrix.target }}.zip
            dist/md-${{ matrix.target }}.tar.gz
            dist/md-${{ matrix.target }}.zip
            dist/crawl-${{ matrix.target }}.tar.gz
            dist/crawl-${{ matrix.target }}.zip
            dist/tools-${{ matrix.target }}.tar.gz
            dist/tools-${{ matrix.target }}.zip
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Compute checksums
        run: |
          cd artifacts
          sha256sum rag-* md-* crawl-* tools-* > SHA256SUMS

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            artifacts/rag-*
            artifacts/md-*
            artifacts/crawl-*
            artifacts/tools-*
            artifacts/SHA256SUMS
