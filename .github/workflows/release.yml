name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.0)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os:     macos-latest
            archive: tar.gz
            features: metal
          # Cross-compile Intel macOS from the arm64 runner — GitHub has
          # effectively retired the macos-13 (Intel) hosted runners.
          - target: x86_64-apple-darwin
            os:     macos-latest
            archive: tar.gz
            features: metal
          - target: x86_64-unknown-linux-gnu
            os:     ubuntu-latest
            archive: tar.gz
            features: ''
          - target: x86_64-pc-windows-msvc
            os:     windows-latest
            archive: zip
            features: ''

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build rag (with optional features)
        shell: bash
        run: |
          features="${{ matrix.features }}"
          if [ -n "$features" ]; then
            cargo build --release --target ${{ matrix.target }} --bin rag --features "rag-cli/$features"
          else
            cargo build --release --target ${{ matrix.target }} --bin rag
          fi

      - name: Build md
        shell: bash
        # md has no GPU features — pure CPU on every platform.
        run: cargo build --release --target ${{ matrix.target }} --bin md

      - name: Stage artifacts (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p stage-rag stage-md dist
          cp "target/${{ matrix.target }}/release/rag" stage-rag/rag
          cp README.md LICENSE stage-rag/
          tar -czf "dist/rag-${{ matrix.target }}.tar.gz" -C stage-rag rag README.md LICENSE

          cp "target/${{ matrix.target }}/release/md" stage-md/md
          cp README.md LICENSE stage-md/
          tar -czf "dist/md-${{ matrix.target }}.tar.gz" -C stage-md md README.md LICENSE

      - name: Stage artifacts (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "stage-rag","stage-md","dist" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/rag.exe" "stage-rag/rag.exe"
          Copy-Item "README.md" "stage-rag/README.md"
          Copy-Item "LICENSE"   "stage-rag/LICENSE"
          Compress-Archive -Path "stage-rag/rag.exe","stage-rag/README.md","stage-rag/LICENSE" `
                           -DestinationPath "dist/rag-${{ matrix.target }}.zip" -Force

          Copy-Item "target/${{ matrix.target }}/release/md.exe" "stage-md/md.exe"
          Copy-Item "README.md" "stage-md/README.md"
          Copy-Item "LICENSE"   "stage-md/LICENSE"
          Compress-Archive -Path "stage-md/md.exe","stage-md/README.md","stage-md/LICENSE" `
                           -DestinationPath "dist/md-${{ matrix.target }}.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            dist/rag-${{ matrix.target }}.tar.gz
            dist/rag-${{ matrix.target }}.zip
            dist/md-${{ matrix.target }}.tar.gz
            dist/md-${{ matrix.target }}.zip
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Compute checksums
        run: |
          cd artifacts
          sha256sum rag-* md-* > SHA256SUMS

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: |
            artifacts/rag-*
            artifacts/md-*
            artifacts/SHA256SUMS
