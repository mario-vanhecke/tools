name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build (debug)
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace --all-targets

      - name: Build (release)
        run: cargo build --workspace --release

      - name: Smoke test
        shell: bash
        run: |
          set -euo pipefail
          BIN="$PWD/target/release/rag"
          T="$(mktemp -d)"
          cd "$T"
          "$BIN" init .
          mkdir docs
          printf "# Branching\n\n## Trunk\n\nWe use trunk-based development.\n" > docs/branching.md
          printf "# Releases\n\nWe ship every two weeks.\n" > docs/release.md
          "$BIN" add docs/
          "$BIN" ls
          "$BIN" status
          # The full index path needs the embedder model (~2.2 GB); CI doesn't
          # download it. Verify everything else end-to-end instead.
          "$BIN" info --check
          "$BIN" --json config list >/dev/null
          "$BIN" --json status >/dev/null

      - name: Smoke test (crawl)
        shell: bash
        run: |
          set -euo pipefail
          BIN="$PWD/target/release/crawl"
          T="$(mktemp -d)"
          cd "$T"
          "$BIN" init .
          mkdir -p docs/sub
          printf 'hello' > docs/a.pdf
          printf 'world' > docs/notes.txt
          printf 'deep'  > docs/sub/c.md
          "$BIN" source add docs local ./docs
          "$BIN" discover                 # canonical name
          "$BIN" run                      # hidden alias still works
          "$BIN" status
          "$BIN" ls
          "$BIN" find a --ext pdf
          "$BIN" --json status >/dev/null
          "$BIN" --json config list >/dev/null
          "$BIN" info --check
          test "$("$BIN" export --format paths | wc -l | tr -d ' ')" = "3"
          # fetch materializes into a local tree, preserving structure
          "$BIN" fetch --out ./files
          test -f "files/docs/sub/c.md"
          test "$(cat files/docs/notes.txt)" = "world"

      - name: Smoke test (distill + recall)
        shell: bash
        # The end-to-end build/search path (with a mock embeddings server) is
        # covered by distill's integration test above; here we just confirm the
        # binaries run and the config template round-trips.
        run: |
          set -euo pipefail
          DISTILL="$PWD/target/release/distill"
          RECALL="$PWD/target/release/recall"
          T="$(mktemp -d)"; cd "$T"
          "$DISTILL" --version
          "$RECALL" --version
          "$DISTILL" init                 # writes knowledge.toml
          test -f knowledge.toml
          "$DISTILL" --help >/dev/null
          "$RECALL" serve --help >/dev/null

  # crawl and the knowledge stack (kb-core/distill/recall) are pure-Rust and
  # cross-platform; verify them on Windows too without pulling rag's candle/GPU
  # stack (which the main job above does not build on Windows).
  crawl-windows:
    name: crawl + knowledge (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy -p crawl-core -p crawl-cli -p kb-core -p distill -p recall --all-targets -- -D warnings

      - name: Test
        run: cargo test -p crawl-core -p kb-core -p distill -p recall

      - name: Build (release)
        run: cargo build -p crawl-cli -p distill -p recall --release
